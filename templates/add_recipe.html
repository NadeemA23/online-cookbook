<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Recipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="layout-body">

    <!-- Header -->
    <header class="site-header">
        <h1>Cookbook</h1>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_recipe') }}">Add Recipe</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>

    <!-- Background image grid -->
    <div class="background-grid">
        <div class="grid-wrapper">
            {% for i in range(1, 10) %}
            <div class="grid-item" style="background-image: url('{{ url_for('static', filename='images/meal' ~ i ~ '.jpg') }}');"></div>
            {% endfor %}
        </div>
    </div>

    <!-- Main content -->
    <main class="main-content">
        <h2 class="page-heading">Add a New Recipe</h2>

        {% if message %}
        <p class="error">{{ message }}</p>
        {% endif %}

        <form method="POST">
            <input type="text" name="name" placeholder="Recipe Name" required>
            <textarea name="ingredients" placeholder="Ingredients" required></textarea>
            <textarea name="steps" placeholder="Preparation Steps" required></textarea>
            <input type="text" name="cuisine" placeholder="Cuisine" required>
            <input type="text" name="tools" placeholder="Required Tools" required>
            <button type="submit">Add Recipe</button>
        </form>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p><a href="{{ url_for('home') }}">Back to Home</a></p>
        <p>&copy; 2025 My Cookbook App</p>
    </footer>

</body>
</html>
